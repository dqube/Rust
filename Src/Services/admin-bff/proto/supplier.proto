syntax = "proto3";
package supplier.v1;

// ─────────────────────────────────────────────────────────────────────────────
// Common
// ─────────────────────────────────────────────────────────────────────────────

message Empty {}

// ─────────────────────────────────────────────────────────────────────────────
// Supplier
// ─────────────────────────────────────────────────────────────────────────────

message SupplierMessage {
    string  id                        = 1;
    string  user_id                   = 2;
    string  supplier_code             = 3;
    string  company_name              = 4;
    string  tax_identification_number = 5;
    string  registration_number       = 6;
    string  email                     = 7;
    string  phone                     = 8;
    string  website                   = 9;
    string  business_type             = 10;
    int32   years_in_business         = 11;
    string  status                    = 12;  // "Active"|"Inactive"|"Suspended"|"Pending"
    string  onboarding_status         = 13;  // "Pending"|"UnderReview"|"Approved"|"Rejected"
    string  rating                    = 14;  // decimal string, empty if null
    int32   total_orders              = 15;
    string  notes                     = 16;
    string  created_at                = 17;
    string  created_by                = 18;
    string  updated_at                = 19;
    string  updated_by                = 20;
}

message ListSuppliersRequest {
    uint32  page        = 1;
    uint32  per_page    = 2;
    bool    active_only = 3;
    string  search      = 4;
}

message ListSuppliersResponse {
    repeated SupplierMessage items       = 1;
    uint64                   total       = 2;
    uint32                   page        = 3;
    uint32                   per_page    = 4;
    uint32                   total_pages = 5;
}

message CreateSupplierRequest {
    string  company_name              = 1;
    string  tax_identification_number = 2;
    string  registration_number       = 3;
    string  email                     = 4;
    string  phone                     = 5;
    string  website                   = 6;
    string  business_type             = 7;
    string  notes                     = 8;
    string  created_by                = 9;
    // Initial address (required)
    string  address_type    = 10;
    string  address_line1   = 11;
    string  address_city    = 12;
    string  address_postal  = 13;
    string  address_country = 14;
    // Initial contact (required)
    string  contact_type        = 15;
    string  contact_first_name  = 16;
    string  contact_last_name   = 17;
    string  contact_email       = 18;
}

message UpdateSupplierRequest {
    string  id                        = 1;
    string  company_name              = 2;
    string  tax_identification_number = 3;
    string  registration_number       = 4;
    string  email                     = 5;
    string  phone                     = 6;
    string  website                   = 7;
    string  business_type             = 8;
    int32   years_in_business         = 9;
    string  notes                     = 10;
    string  updated_by                = 11;
}

message GetSupplierRequest          { string id = 1; }
message ActivateSupplierRequest     { string id = 1; string updated_by = 2; }
message DeactivateSupplierRequest   { string id = 1; string updated_by = 2; }
message DeleteSupplierRequest       { string id = 1; }

message UpdateSupplierStatusRequest {
    string  id         = 1;
    string  status     = 2;
    string  updated_by = 3;
}

message UpdateOnboardingStatusRequest {
    string  id                = 1;
    string  onboarding_status = 2;
    string  updated_by        = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Supplier Address
// ─────────────────────────────────────────────────────────────────────────────

message SupplierAddressMessage {
    string  id           = 1;
    string  supplier_id  = 2;
    string  address_type = 3;
    string  line1        = 4;
    string  line2        = 5;
    string  city         = 6;
    string  state        = 7;
    string  postal_code  = 8;
    string  country      = 9;
    bool    is_primary   = 10;
    string  notes        = 11;
    string  created_at   = 12;
    string  updated_at   = 13;
}

message GetSupplierAddressesRequest { string supplier_id = 1; }
message GetSupplierAddressesResponse { repeated SupplierAddressMessage items = 1; }

// ─────────────────────────────────────────────────────────────────────────────
// Supplier Contact
// ─────────────────────────────────────────────────────────────────────────────

message SupplierContactMessage {
    string  id           = 1;
    string  supplier_id  = 2;
    string  user_id      = 3;
    string  contact_type = 4;
    string  first_name   = 5;
    string  last_name    = 6;
    string  email        = 7;
    string  phone        = 8;
    string  mobile       = 9;
    string  position     = 10;
    string  department   = 11;
    bool    is_primary   = 12;
    bool    can_login    = 13;
    string  notes        = 14;
    string  created_at   = 15;
    string  updated_at   = 16;
}

message GetSupplierContactsRequest  { string supplier_id = 1; }
message GetSupplierContactsResponse { repeated SupplierContactMessage items = 1; }

message CreateSupplierContactRequest {
    string  supplier_id  = 1;
    string  first_name   = 2;
    string  last_name    = 3;
    string  email        = 4;
    string  phone        = 5;
    string  position     = 6;
    bool    is_primary   = 7;
    string  notes        = 8;
    string  created_by   = 9;
}

// ─────────────────────────────────────────────────────────────────────────────
// Supplier Document
// ─────────────────────────────────────────────────────────────────────────────

message SupplierDocumentMessage {
    string  id            = 1;
    string  supplier_id   = 2;
    string  file_name     = 3;
    string  object_name   = 4;
    string  content_type  = 5;
    string  document_type = 6;
    string  created_at    = 7;
    string  created_by    = 8;
    string  url           = 9;  // presigned GET URL (populated on read)
    string  url_expires_at = 10;
}

message GetSupplierDocumentsRequest  { string supplier_id = 1; }
message GetSupplierDocumentsResponse { repeated SupplierDocumentMessage items = 1; }

// Presigned document upload workflow
message RequestDocumentUploadUrlRequest {
    string  supplier_id   = 1;
    string  file_name     = 2;
    string  content_type  = 3;
    string  document_type = 4;
}
message RequestDocumentUploadUrlResponse {
    string  upload_url   = 1;
    string  object_name  = 2;
    string  expires_at   = 3;
}

message ConfirmDocumentUploadRequest {
    string  supplier_id   = 1;
    string  object_name   = 2;
    string  file_name     = 3;
    string  content_type  = 4;
    string  document_type = 5;
    string  created_by    = 6;
}

message DeleteSupplierDocumentRequest {
    string  supplier_id  = 1;
    string  document_id  = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Supplier Product
// ─────────────────────────────────────────────────────────────────────────────

message SupplierProductMessage {
    string  id                  = 1;
    string  supplier_id         = 2;
    string  product_id          = 3;
    string  variant_id          = 4;
    string  supplier_sku        = 5;
    string  unit_cost           = 6;  // decimal string
    int32   lead_time_days      = 7;
    int32   min_order_quantity  = 8;
    bool    is_preferred        = 9;
    string  created_at          = 10;
    string  updated_at          = 11;
}

message ListSupplierProductsRequest  { string supplier_id = 1; }
message ListSupplierProductsResponse { repeated SupplierProductMessage items = 1; }

message AddSupplierProductRequest {
    string  supplier_id         = 1;
    string  product_id          = 2;
    string  variant_id          = 3;
    string  unit_cost           = 4;
    string  supplier_sku        = 5;
    int32   lead_time_days      = 6;
    int32   min_order_quantity  = 7;
    bool    is_preferred        = 8;
    string  created_by          = 9;
}

message RemoveSupplierProductRequest {
    string  supplier_id         = 1;
    string  supplier_product_id = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Purchase Order
// ─────────────────────────────────────────────────────────────────────────────

message PurchaseOrderDetailMessage {
    string  id                = 1;
    string  order_id          = 2;
    string  product_id        = 3;
    int32   quantity          = 4;
    string  unit_cost         = 5;
    int32   received_quantity = 6;
    string  created_at        = 7;
}

message PurchaseOrderMessage {
    string  id                  = 1;
    string  supplier_id         = 2;
    int32   store_id            = 3;
    string  order_date          = 4;
    string  expected_date       = 5;
    string  status              = 6;
    string  total_amount        = 7;
    string  shipping_address_id = 8;
    string  contact_person_id   = 9;
    string  created_at          = 10;
    string  updated_at          = 11;
    repeated PurchaseOrderDetailMessage order_details = 12;
}

message ListPurchaseOrdersRequest {
    string  supplier_id = 1;
    int32   store_id    = 2;
    string  status      = 3;
    string  from_date   = 4;
    string  to_date     = 5;
}
message ListPurchaseOrdersResponse { repeated PurchaseOrderMessage items = 1; }

message PurchaseOrderDetailInput {
    string  product_id = 1;
    int32   quantity   = 2;
    string  unit_cost  = 3;
}

message CreatePurchaseOrderRequest {
    string  supplier_id         = 1;
    int32   store_id            = 2;
    string  expected_date       = 3;
    string  shipping_address_id = 4;
    string  contact_person_id   = 5;
    string  created_by          = 6;
    repeated PurchaseOrderDetailInput order_details = 7;
}

message GetPurchaseOrderRequest     { string id = 1; }
message SubmitPurchaseOrderRequest  { string id = 1; string updated_by = 2; }
message CancelPurchaseOrderRequest  { string id = 1; string updated_by = 2; }

// ─────────────────────────────────────────────────────────────────────────────
// Service
// ─────────────────────────────────────────────────────────────────────────────

service SupplierService {
    // Suppliers
    rpc ListSuppliers           (ListSuppliersRequest)           returns (ListSuppliersResponse);
    rpc CreateSupplier          (CreateSupplierRequest)          returns (SupplierMessage);
    rpc GetSupplier             (GetSupplierRequest)             returns (SupplierMessage);
    rpc UpdateSupplier          (UpdateSupplierRequest)          returns (SupplierMessage);
    rpc ActivateSupplier        (ActivateSupplierRequest)        returns (SupplierMessage);
    rpc DeactivateSupplier      (DeactivateSupplierRequest)      returns (SupplierMessage);
    rpc DeleteSupplier          (DeleteSupplierRequest)          returns (Empty);
    rpc UpdateSupplierStatus    (UpdateSupplierStatusRequest)    returns (SupplierMessage);
    rpc UpdateOnboardingStatus  (UpdateOnboardingStatusRequest)  returns (SupplierMessage);

    // Addresses
    rpc GetSupplierAddresses    (GetSupplierAddressesRequest)    returns (GetSupplierAddressesResponse);

    // Contacts
    rpc GetSupplierContacts     (GetSupplierContactsRequest)     returns (GetSupplierContactsResponse);
    rpc CreateSupplierContact   (CreateSupplierContactRequest)   returns (SupplierContactMessage);

    // Documents (presigned URL workflow)
    rpc GetSupplierDocuments         (GetSupplierDocumentsRequest)         returns (GetSupplierDocumentsResponse);
    rpc RequestDocumentUploadUrl     (RequestDocumentUploadUrlRequest)     returns (RequestDocumentUploadUrlResponse);
    rpc ConfirmDocumentUpload        (ConfirmDocumentUploadRequest)        returns (SupplierDocumentMessage);
    rpc DeleteSupplierDocument       (DeleteSupplierDocumentRequest)       returns (Empty);

    // Supplier Products
    rpc ListSupplierProducts    (ListSupplierProductsRequest)    returns (ListSupplierProductsResponse);
    rpc AddSupplierProduct      (AddSupplierProductRequest)      returns (SupplierProductMessage);
    rpc RemoveSupplierProduct   (RemoveSupplierProductRequest)   returns (Empty);

    // Purchase Orders
    rpc ListPurchaseOrders      (ListPurchaseOrdersRequest)      returns (ListPurchaseOrdersResponse);
    rpc CreatePurchaseOrder     (CreatePurchaseOrderRequest)     returns (PurchaseOrderMessage);
    rpc GetPurchaseOrder        (GetPurchaseOrderRequest)        returns (PurchaseOrderMessage);
    rpc SubmitPurchaseOrder     (SubmitPurchaseOrderRequest)     returns (PurchaseOrderMessage);
    rpc CancelPurchaseOrder     (CancelPurchaseOrderRequest)     returns (PurchaseOrderMessage);
}
