syntax = "proto3";

package catalog.v1;

service CatalogService {
  // ── Products ────────────────────────────────────────────────────────────────
  rpc CreateProduct               (CreateProductRequest)               returns (ProductMessage);
  rpc GetProduct                  (GetProductRequest)                  returns (ProductMessage);
  rpc UpdateProduct               (UpdateProductRequest)               returns (ProductMessage);
  rpc DiscontinueProduct          (ProductIdRequest)                   returns (ProductMessage);
  rpc ReactivateProduct           (ProductIdRequest)                   returns (ProductMessage);
  rpc UpdateProductPricing        (UpdateProductPricingRequest)        returns (ProductMessage);
  rpc ListProducts                (ListProductsRequest)                returns (ListProductsResponse);
  rpc AssignProductBrand          (AssignProductBrandRequest)          returns (ProductMessage);
  rpc AddProductVariant           (AddProductVariantRequest)           returns (ProductMessage);
  rpc UpdateProductVariant        (UpdateProductVariantRequest)        returns (ProductMessage);
  rpc RemoveProductVariant        (RemoveProductVariantRequest)        returns (ProductMessage);
  rpc SetDefaultVariant           (SetDefaultVariantRequest)           returns (ProductMessage);
  rpc SetProductDimensions        (SetProductDimensionsRequest)        returns (ProductMessage);
  rpc SetProductSpecifications    (SetProductSpecificationsRequest)    returns (ProductMessage);
  rpc SetProductTags              (SetProductTagsRequest)              returns (ProductMessage);
  rpc SetProductTaxConfigurations (SetProductTaxConfigurationsRequest) returns (ProductMessage);
  rpc RequestProductImageUploadUrl(RequestProductImageUploadUrlRequest) returns (RequestProductImageUploadUrlResponse);
  rpc ConfirmProductImageUpload   (ConfirmProductImageUploadRequest)   returns (ProductMessage);
  rpc DeleteProductImage          (DeleteProductImageRequest)          returns (ProductMessage);

  // ── Categories ──────────────────────────────────────────────────────────────
  rpc CreateCategory                (CreateCategoryRequest)                returns (CategoryMessage);
  rpc GetCategory                   (GetCategoryRequest)                   returns (CategoryMessage);
  rpc ListCategories                (ListCategoriesRequest)                returns (ListCategoriesResponse);
  rpc UpdateCategory                (UpdateCategoryRequest)                returns (CategoryMessage);
  rpc DeleteCategory                (DeleteCategoryRequest)                returns (Empty);
  rpc RequestCategoryImageUploadUrl (RequestCategoryImageUploadUrlRequest) returns (RequestCategoryImageUploadUrlResponse);
  rpc ConfirmCategoryImageUpload    (ConfirmCategoryImageUploadRequest)    returns (CategoryMessage);

  // ── Brands ──────────────────────────────────────────────────────────────────
  rpc CreateBrand     (CreateBrandRequest)  returns (BrandMessage);
  rpc GetBrand        (GetBrandRequest)     returns (BrandMessage);
  rpc ListBrands      (ListBrandsRequest)   returns (ListBrandsResponse);
  rpc UpdateBrand     (UpdateBrandRequest)  returns (BrandMessage);
  rpc ActivateBrand   (BrandIdRequest)      returns (BrandMessage);
  rpc DeactivateBrand (BrandIdRequest)      returns (BrandMessage);

  // ── Tax Configurations ──────────────────────────────────────────────────────
  rpc CreateTaxConfiguration          (CreateTaxConfigurationRequest)  returns (TaxConfigMessage);
  rpc GetTaxConfiguration             (TaxConfigIdRequest)             returns (TaxConfigMessage);
  rpc ListTaxConfigurations           (ListTaxConfigurationsRequest)   returns (ListTaxConfigurationsResponse);
  rpc UpdateTaxConfiguration          (UpdateTaxConfigurationRequest)  returns (TaxConfigMessage);
  rpc DeleteTaxConfiguration          (TaxConfigIdRequest)             returns (Empty);
  rpc ActivateTaxConfiguration        (TaxConfigIdRequest)             returns (TaxConfigMessage);
  rpc DeactivateTaxConfiguration      (TaxConfigIdRequest)             returns (TaxConfigMessage);
  rpc GetApplicableTaxConfigurations  (GetApplicableTaxConfigurationsRequest) returns (ListTaxConfigurationsResponse);
  rpc CalculateTax                    (CalculateTaxRequest)            returns (CalculateTaxResponse);
}

message Empty {}

// ── Product messages ─────────────────────────────────────────────────────────

message ProductMessage {
  string product_id                    = 1;
  string sku                           = 2;
  string name                          = 3;
  string description                   = 4;
  string slug                          = 5;
  int32  category_id                   = 6;
  double base_price                    = 7;
  double cost_price                    = 8;
  bool   is_taxable                    = 9;
  bool   is_discontinued               = 10;
  bool   is_inventory_tracked          = 11;
  string brand_id                      = 12;
  int32  weight_grams                  = 13;
  int32  width_cm                      = 14;
  int32  height_cm                     = 15;
  int32  depth_cm                      = 16;
  string specifications_json           = 17;
  repeated string tags                 = 18;
  repeated string assigned_tax_config_ids = 19;
  double average_rating                = 20;
  int32  total_reviews                 = 21;
  repeated ProductVariantMessage variants = 22;
  repeated ProductImageMessage   images   = 23;
  string created_at                    = 24;
  string updated_at                    = 25;
}

message ProductVariantMessage {
  string variant_id            = 1;
  string sku                   = 2;
  string description           = 3;
  double price_override        = 4;
  double cost_price_override   = 5;
  bool   is_active             = 6;
  bool   is_default            = 7;
  string barcode               = 8;
  string barcode_type          = 9;
  int32  weight_grams          = 10;
  int32  width_cm              = 11;
  int32  height_cm             = 12;
  int32  depth_cm              = 13;
  string attributes_json       = 14;
}

message ProductImageMessage {
  string image_id   = 1;
  string url        = 2;
  bool   is_main    = 3;
  int32  sort_order = 4;
  string alt_text   = 5;
}

message ProductSummary {
  string product_id      = 1;
  string sku             = 2;
  string name            = 3;
  int32  category_id     = 4;
  double base_price      = 5;
  bool   is_taxable      = 6;
  bool   is_discontinued = 7;
  string slug            = 8;
  string created_at      = 9;
}

message ProductIdRequest       { string product_id = 1; }

message CreateProductRequest {
  string sku         = 1;
  string name        = 2;
  int32  category_id = 3;
  double base_price  = 4;
  double cost_price  = 5;
  string description = 6;
  bool   is_taxable  = 7;
}

message UpdateProductRequest {
  string product_id  = 1;
  string name        = 2;
  int32  category_id = 3;
  double base_price  = 4;
  double cost_price  = 5;
  bool   is_taxable  = 6;
  string description = 7;
}

message UpdateProductPricingRequest {
  string product_id = 1;
  double price      = 2;
}

message GetProductRequest  { string product_id = 1; }

message ListProductsRequest {
  uint32 page           = 1;
  uint32 per_page       = 2;
  string search         = 3;
  int32  category_id    = 4;
  bool   has_category   = 5;
  double min_price      = 6;
  double max_price      = 7;
  bool   has_price_range = 8;
  string sort_by        = 9;
  bool   sort_desc      = 10;
}

message ListProductsResponse {
  repeated ProductSummary items = 1;
  uint64 total                  = 2;
  uint32 total_pages            = 3;
  uint32 page                   = 4;
  uint32 per_page               = 5;
}

message AssignProductBrandRequest {
  string product_id = 1;
  string brand_id   = 2;
}

message AddProductVariantRequest {
  string product_id             = 1;
  string sku                    = 2;
  string attributes_json        = 3;
  double price_override         = 4;
  bool   has_price_override     = 5;
  string description            = 6;
  double cost_price_override    = 7;
  bool   has_cost_price_override = 8;
  string barcode                = 9;
  string barcode_type           = 10;
  int32  weight_grams           = 11;
  bool   has_weight             = 12;
  int32  width_cm               = 13;
  int32  height_cm              = 14;
  int32  depth_cm               = 15;
  bool   has_dimensions         = 16;
}

message UpdateProductVariantRequest {
  string product_id             = 1;
  string variant_id             = 2;
  string sku                    = 3;
  string attributes_json        = 4;
  double price_override         = 5;
  bool   has_price_override     = 6;
  string description            = 7;
  bool   is_active              = 8;
  double cost_price_override    = 9;
  bool   has_cost_price_override = 10;
  string barcode                = 11;
  string barcode_type           = 12;
  bool   has_barcode            = 13;
  int32  weight_grams           = 14;
  bool   has_weight             = 15;
  int32  width_cm               = 16;
  int32  height_cm              = 17;
  int32  depth_cm               = 18;
  bool   has_dimensions         = 19;
}

message SetDefaultVariantRequest  { string product_id = 1; string variant_id = 2; }
message RemoveProductVariantRequest { string product_id = 1; string variant_id = 2; }

message SetProductDimensionsRequest {
  string product_id   = 1;
  int32  weight_grams = 2;
  bool   has_weight   = 3;
  int32  width_cm     = 4;
  int32  height_cm    = 5;
  int32  depth_cm     = 6;
  bool   has_dims     = 7;
}

message SetProductSpecificationsRequest {
  string product_id         = 1;
  string specifications_json = 2;
}

message SetProductTagsRequest {
  string          product_id = 1;
  repeated string tags       = 2;
}

message SetProductTaxConfigurationsRequest {
  string          product_id     = 1;
  repeated string tax_config_ids = 2;
}

message RequestProductImageUploadUrlRequest {
  string product_id    = 1;
  string file_name     = 2;
  string content_type  = 3;
  bool   is_main       = 4;
  int32  sort_order    = 5;
  string alt_text      = 6;
}

message RequestProductImageUploadUrlResponse {
  string upload_url   = 1;
  string object_name  = 2;
  string expires_at   = 3;
}

message ConfirmProductImageUploadRequest {
  string product_id   = 1;
  string object_name  = 2;
  string file_name    = 3;
  string content_type = 4;
  bool   is_main      = 5;
  int32  sort_order   = 6;
  string alt_text     = 7;
}

message DeleteProductImageRequest {
  string product_id = 1;
  string image_id   = 2;
}

// ── Category messages ─────────────────────────────────────────────────────────

message CategoryMessage {
  int32  category_id        = 1;
  string name               = 2;
  string description        = 3;
  string slug               = 4;
  int32  parent_category_id = 5;
  bool   has_parent         = 6;
  string image_url          = 7;
  bool   is_active          = 8;
  string created_at         = 9;
  string updated_at         = 10;
}

message GetCategoryRequest    { int32 category_id = 1; }
message DeleteCategoryRequest { int32 category_id = 1; }

message ListCategoriesRequest {
  bool  include_hierarchy   = 1;
  int32 parent_category_id  = 2;
  bool  has_parent          = 3;
}

message ListCategoriesResponse { repeated CategoryMessage categories = 1; }

message CreateCategoryRequest {
  string name               = 1;
  int32  parent_category_id = 2;
  bool   has_parent         = 3;
  string description        = 4;
}

message UpdateCategoryRequest {
  int32  category_id        = 1;
  string name               = 2;
  string description        = 3;
  int32  parent_category_id = 4;
  bool   has_parent         = 5;
}

message RequestCategoryImageUploadUrlRequest {
  int32  category_id  = 1;
  string file_name    = 2;
  string content_type = 3;
}

message RequestCategoryImageUploadUrlResponse {
  string upload_url  = 1;
  string object_name = 2;
  string expires_at  = 3;
}

message ConfirmCategoryImageUploadRequest {
  int32  category_id  = 1;
  string object_name  = 2;
}

// ── Brand messages ────────────────────────────────────────────────────────────

message BrandMessage {
  string brand_id    = 1;
  string name        = 2;
  string description = 3;
  string slug        = 4;
  string logo_url    = 5;
  string website     = 6;
  bool   is_active   = 7;
  string created_at  = 8;
  string updated_at  = 9;
}

message BrandIdRequest  { string brand_id = 1; }
message GetBrandRequest { string brand_id = 1; }

message CreateBrandRequest {
  string name        = 1;
  string description = 2;
  string website     = 3;
}

message UpdateBrandRequest {
  string brand_id    = 1;
  string name        = 2;
  string description = 3;
  string website     = 4;
}

message ListBrandsRequest {
  uint32 page        = 1;
  uint32 per_page    = 2;
  string search      = 3;
  bool   active_only = 4;
}

message ListBrandsResponse {
  repeated BrandMessage items = 1;
  uint64 total                = 2;
  uint32 total_pages          = 3;
  uint32 page                 = 4;
  uint32 per_page             = 5;
}

// ── Tax configuration messages ────────────────────────────────────────────────

message TaxConfigMessage {
  string tax_config_id  = 1;
  string name           = 2;
  string code           = 3;
  string tax_type       = 4;
  int32  location_id    = 5;
  int32  category_id    = 6;
  bool   has_category   = 7;
  double tax_rate       = 8;
  bool   is_active      = 9;
  string effective_date = 10;
  string expiry_date    = 11;
  string created_at     = 12;
  string updated_at     = 13;
}

message TaxConfigIdRequest { string tax_config_id = 1; }

message CreateTaxConfigurationRequest {
  string name           = 1;
  string code           = 2;
  string tax_type       = 3;
  double tax_rate       = 4;
  int32  location_id    = 5;
  int32  category_id    = 6;
  bool   has_category   = 7;
  string effective_date = 8;
  string expiry_date    = 9;
  bool   has_expiry     = 10;
}

message UpdateTaxConfigurationRequest {
  string tax_config_id  = 1;
  string name           = 2;
  string code           = 3;
  string tax_type       = 4;
  double tax_rate       = 5;
  string effective_date = 6;
  string expiry_date    = 7;
  bool   has_expiry     = 8;
}

message ListTaxConfigurationsRequest {
  int32  location_id     = 1;
  bool   has_location    = 2;
  string tax_type        = 3;
  bool   has_tax_type    = 4;
  bool   active_only     = 5;
}

message ListTaxConfigurationsResponse { repeated TaxConfigMessage tax_configurations = 1; }

message GetApplicableTaxConfigurationsRequest {
  int32 location_id  = 1;
  int32 category_id  = 2;
  bool  has_category = 3;
}

message CalculateTaxRequest {
  int32  location_id  = 1;
  int32  category_id  = 2;
  bool   has_category = 3;
  double amount       = 4;
}

message CalculateTaxResponse {
  double original_amount         = 1;
  double tax_amount              = 2;
  double total_amount            = 3;
  repeated AppliedTaxItem applied = 4;
}

message AppliedTaxItem {
  string name     = 1;
  string code     = 2;
  string tax_type = 3;
  double rate     = 4;
  double amount   = 5;
}
