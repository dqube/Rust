syntax = "proto3";

package fixture.v1;

// ─── Fixture messages used by ddd-bff transcode tests ────────────────────────
//
// These definitions exist purely so the library's own test suite has a working
// descriptor pool without requiring any downstream service proto.  They are NOT
// part of the public API and may change without notice.

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
  int32  code    = 2;
}

message ItemView {
  string id    = 1;
  string name  = 2;
  double price = 3;
}

message ListItemsRequest {
  int32 page     = 1;
  int32 per_page = 2;
}

message ListItemsResponse {
  repeated ItemView items = 1;
  int64             total = 2;
}

// ─── Fixture service ─────────────────────────────────────────────────────────

service FixtureService {
  rpc Echo      (EchoRequest)      returns (EchoResponse);
  rpc ListItems (ListItemsRequest) returns (ListItemsResponse);
}
